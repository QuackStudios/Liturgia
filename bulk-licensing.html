<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Scrolling Carousel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
    }

    .carousel-container {
      width: 80%;
      height: 60%;
      overflow: hidden;
      border: 2px solid #ccc;
      border-radius: 10px;
      background: #fff;
    }

    .carousel-track {
      display: flex;
      transition: transform 1s ease-in-out;
      height: 80%;
    }

    .carousel-card {
      flex: 0 0 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="carousel-container">
    <div class="carousel-track">
      <!-- Customizable content for 4 cards -->
      <div class="carousel-card">Page 1: Welcome to the Carousel</div>
      <div class="carousel-card">Page 2: Customize Your Content</div>
      <div class="carousel-card">Page 3: Add Images or Text</div>
      <div class="carousel-card">Page 4: Fully Customizable</div>
      <!-- Duplicate the 4 cards for seamless looping -->
      <div class="carousel-card">Page 1: Welcome to the Carousel</div>
      <div class="carousel-card">Page 2: Customize Your Content</div>
      <div class="carousel-card">Page 3: Add Images or Text</div>
      <div class="carousel-card">Page 4: Fully Customizable</div>
    </div>
  </div>

  <script>
    const track = document.querySelector('.carousel-track');
    const cards = document.querySelectorAll('.carousel-card');
    const totalCards = cards.length;
    const cardWidth = cards[0].offsetWidth;
    let currentIndex = 0;

    function autoScroll() {
      currentIndex = (currentIndex + 1) % totalCards;
      track.style.transform = `translateX(-${currentIndex * cardWidth}px)`;

      // Reset to the start for seamless looping
      if (currentIndex === totalCards / 2) {
        setTimeout(() => {
          track.style.transition = 'none';
          currentIndex = 0;
          track.style.transform = `translateX(0)`;
          setTimeout(() => {
            track.style.transition = 'transform 1s ease-in-out';
          }, 50);
        }, 1000);
      }
    }

    // Start auto-scrolling every 10 seconds
    setInterval(autoScroll, 10000);

    // Resize listener to ensure proper alignment
    window.addEventListener('resize', () => {
      track.style.transition = 'none';
      track.style.transform = `translateX(-${currentIndex * cards[0].offsetWidth}px)`;
      setTimeout(() => {
        track.style.transition = 'transform 1s ease-in-out';
      }, 50);
    });
  </script>
</body>
</html>
