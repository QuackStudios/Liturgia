<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Stack Effect</title>
  <link defer rel="stylesheet" href="assets/css/features.css">
  <script defer src="assets/js/features.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
 


</head>
<body>
  <div class="layout">
    <div class="background"></div>
    <!-- Sidebar -->
    <div class="left-column">
      <div class="menu-icon">
        <div class="grid-icon" id="menu-button">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
      <div class="scroll-indicator">
        <div class="top-line"></div>
        <div class="ball"></div>
        <div class="bottom-line"></div>
      </div>
      <div class="logo-container">
        <img src="assets/img/Liturgia-Symbol-Logo.png" alt="Logo" class="logo left-column-logo hidden">
      </div>
    </div>
  
    <!-- Main Content -->
    <div class="main-content">
      <div class="top-text">
        <div class="features-button">Features</div>
        <h1 class="main-heading">Explore Liturgia's Powerful Features</h1>
      </div>
      
      <!-- Feature Cards -->
      <div class="features">
        <div class="card" id="card1">
          <img> 
          <p>Unleash the Full Power of Liturgical Planning</p>
        </div>
        <div class="card" id="card2">
          <h2>Feature Two</h2>
          <p>Streamlined Workflows for Every Occasion</p>
        </div>
        <div class="card" id="card3">
          <h2>Feature Three</h2>
          <p>Customised Templates for Your Needs</p>
        </div>
        <div class="card" id="card4">
          <h2>Feature Four</h2>
          <p>Effortless Collaboration Tools</p>
        </div>
      </div>
    </div>
  </div>
  
</body>
</html>
